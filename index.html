<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>House Tracker — Dublin</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f4f0;height:100vh;display:flex;flex-direction:column;overflow:hidden}
.header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:#fff;border-bottom:1px solid #e5e3dc;flex-shrink:0;z-index:20;position:relative}
.header h1{font-size:14px;font-weight:600;color:#1a1a1a}
.add-btn{font-size:12px;padding:6px 12px;border:1px solid #ccc;border-radius:8px;background:#1a1a1a;color:#fff;cursor:pointer;font-weight:500}
.add-btn:hover{background:#333}
.fix-btn{font-size:12px;padding:6px 12px;border:1px solid #ddd;border-radius:8px;background:#555;color:#fff;cursor:pointer}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#ccc;flex-shrink:0}
.sync-dot.ok{background:#1D9E75}.sync-dot.err{background:#e74c3c}.sync-dot.saving{background:#C8823A}

/* Overlay bar */
.overlay-bar{display:flex;gap:6px;align-items:center;padding:7px 14px;background:#fff;border-bottom:1px solid #e5e3dc;flex-shrink:0;z-index:20;position:relative;flex-wrap:wrap}
.overlay-bar span{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.05em;margin-right:4px}
.ovl-btn{font-size:12px;padding:5px 12px;border:1px solid #ddd;border-radius:20px;background:#fff;color:#555;cursor:pointer;transition:all .15s;user-select:none}
.ovl-btn:hover{border-color:#999;color:#1a1a1a}
.ovl-btn.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}

.main{display:flex;flex:1;overflow:hidden;position:relative}
#map{flex:1;z-index:1}

/* Sidebar — two layer panels */
.sidebar{width:290px;background:#fff;border-left:1px solid #e5e3dc;display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;z-index:2;position:relative}

/* Panel 1: list */
.panel-list{position:absolute;inset:0;display:flex;flex-direction:column;transition:transform .25s ease;background:#fff;z-index:1}
.panel-list.slide-out{transform:translateX(-100%)}
.sidebar-hdr{padding:9px 13px;font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid #e5e3dc;flex-shrink:0}
.hlist{overflow-y:auto;flex:1}
.hcard{padding:10px 13px;border-bottom:1px solid #f0ede6;cursor:pointer;transition:background .1s;position:relative}
.hcard:hover{background:#faf9f6}
.hcard.active{background:#eef4ff;border-left:3px solid #378ADD;padding-left:10px}
.hprice{font-size:13px;font-weight:600;color:#1a1a1a}
.haddr{font-size:11px;color:#888;margin-top:2px;line-height:1.4}
.hmeta{display:flex;gap:7px;margin-top:4px;font-size:11px;color:#999;align-items:center;flex-wrap:wrap}
.sdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.hcard-del{display:none;position:absolute;top:50%;right:10px;transform:translateY(-50%);background:#fff5f4;border:1px solid #f5c6c2;color:#c0392b;border-radius:6px;padding:3px 8px;font-size:11px;cursor:pointer;z-index:2}
.hcard:hover .hcard-del{display:block}
.hcard-del:hover{background:#ffe0de}
.thumb{width:38px;height:38px;object-fit:cover;border-radius:6px;flex-shrink:0}
.empty{padding:18px 13px;font-size:13px;color:#aaa;line-height:1.6}

/* Panel 2: detail drawer */
.panel-detail{position:absolute;inset:0;display:flex;flex-direction:column;background:#f5f4f0;z-index:2;transform:translateX(100%);transition:transform .25s ease;overflow:hidden}
.panel-detail.slide-in{transform:translateX(0)}
.detail-hdr{display:flex;align-items:center;gap:8px;padding:10px 13px;background:#fff;border-bottom:1px solid #e5e3dc;flex-shrink:0}
.back-btn{display:flex;align-items:center;gap:4px;font-size:12px;color:#666;cursor:pointer;border:none;background:none;padding:4px 8px 4px 0;line-height:1}
.back-btn:hover{color:#1a1a1a}
.detail-scroll{overflow-y:auto;flex:1;padding:12px}
.dcard{background:#fff;border-radius:12px;border:1px solid #e5e3dc;padding:16px;margin-bottom:12px}
.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:7px;margin-bottom:12px}
.photo-item{position:relative;aspect-ratio:4/3;border-radius:7px;overflow:hidden;background:#f0ede6}
.photo-item img{width:100%;height:100%;object-fit:cover}
.photo-del{position:absolute;top:3px;right:3px;background:rgba(0,0,0,.55);color:#fff;border:none;border-radius:50%;width:20px;height:20px;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.photo-add{border:2px dashed #ddd;border-radius:7px;aspect-ratio:4/3;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;color:#aaa;font-size:11px;gap:3px}
.photo-add:hover{border-color:#999;color:#666}
.photo-add span{font-size:18px}
.edit-field{margin-bottom:9px}
.edit-field label{font-size:10px;color:#999;display:block;margin-bottom:3px;text-transform:uppercase;letter-spacing:.04em}
.edit-field input,.edit-field select{width:100%;border:1px solid #ddd;border-radius:7px;padding:7px 9px;font-size:12px;font-family:inherit;color:#1a1a1a;background:#fff}
.edit-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.view-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.dstat{background:#f5f4f0;border-radius:7px;padding:8px 10px}
.dstat label{font-size:10px;color:#999;display:block;margin-bottom:2px;text-transform:uppercase;letter-spacing:.04em}
.dstat span{font-size:13px;font-weight:600;color:#1a1a1a}
.section-label{font-size:10px;color:#999;margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em;margin-top:11px}
.stars{display:flex;gap:3px;margin-bottom:4px}
.star{font-size:20px;cursor:pointer;color:#ddd;line-height:1;transition:color .1s}
.star.on{color:#C8823A}
textarea{width:100%;border:1px solid #e0ddd6;border-radius:7px;padding:8px 10px;font-size:12px;font-family:inherit;background:#fff;color:#1a1a1a;resize:vertical;min-height:65px;line-height:1.5;margin-top:4px}
.dlink{display:inline-flex;align-items:center;gap:4px;font-size:12px;color:#378ADD;margin-top:8px;text-decoration:none}
.dlink:hover{text-decoration:underline}
.dfooter{margin-top:12px;padding-top:10px;border-top:1px solid #f0ede6;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.ss{font-size:12px;padding:5px 8px;border:1px solid #ddd;border-radius:7px;background:#fff;color:#1a1a1a;cursor:pointer}
.btn{padding:5px 11px;border:1px solid #ddd;border-radius:7px;font-size:12px;cursor:pointer;background:#fff;color:#555;font-family:inherit}
.btn:hover{background:#f5f4f0}
.btn.primary{background:#1a1a1a;color:#fff;border-color:#1a1a1a;font-weight:500}
.btn.primary:hover{background:#333}
.btn.danger{color:#c0392b;border-color:#f5c6c2}
.btn.danger:hover{background:#fff5f4}
.dprice-view{font-size:19px;font-weight:700;color:#1a1a1a}
.daddr-view{font-size:12px;color:#888;margin-top:2px;margin-bottom:12px}
.dcard-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:3px;gap:8px}

/* Modal */
.modal-wrap{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);align-items:center;justify-content:center;z-index:200}
.modal-wrap.open{display:flex}
.modal{background:#fff;border-radius:14px;padding:20px;width:350px;box-shadow:0 8px 40px rgba(0,0,0,.15);max-height:90vh;overflow-y:auto}
.modal h2{font-size:14px;font-weight:600;margin-bottom:14px}
.field{margin-bottom:9px}
.field label{font-size:11px;color:#888;display:block;margin-bottom:3px;text-transform:uppercase;letter-spacing:.04em}
.field input{width:100%;border:1px solid #ddd;border-radius:8px;padding:7px 10px;font-size:13px;font-family:inherit;color:#1a1a1a}
.field input:focus{outline:none;border-color:#999}
.tc{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mactions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
.hint{font-size:11px;color:#aaa;margin-top:3px}
</style>
</head>
<body>

<div class="header">
  <h1>🏠 House Tracker <span id="cnt" style="color:#888;font-weight:400;font-size:12px"></span></h1>
  <div style="display:flex;gap:8px;align-items:center">
    <div class="sync-dot" id="sync-dot"></div>
    <span id="sync-label" style="font-size:11px;color:#aaa">Connecting…</span>
    <button class="fix-btn" onclick="regeocodeAll()">📍 Fix pins</button>
    <button class="add-btn" onclick="openModal()">+ Add property</button>
  </div>
</div>

<div class="overlay-bar">
  <span>Overlay</span>
  <button class="ovl-btn active" id="ovl-none" onclick="setOverlay('none')">None</button>
  <button class="ovl-btn" id="ovl-transport" onclick="setOverlay('transport')">🚌 Transport</button>
  <button class="ovl-btn" id="ovl-area" onclick="setOverlay('area')">⬤ Floor area</button>
  <button class="ovl-btn" id="ovl-fees" onclick="setOverlay('fees')">💰 Maint. fees</button>
  <button class="ovl-btn" id="ovl-green" onclick="setOverlay('green')">🌿 Green spaces</button>
</div>

<div class="main">
  <div id="map"></div>
  <div class="sidebar">
    <!-- Panel 1: list -->
    <div class="panel-list" id="panel-list">
      <div class="sidebar-hdr">Properties</div>
      <div class="hlist" id="hlist"></div>
      <div class="empty" id="hempty">No properties yet.<br>Add a Daft or MyHome listing to get started.</div>
    </div>
    <!-- Panel 2: detail drawer -->
    <div class="panel-detail" id="panel-detail">
      <div class="detail-hdr">
        <button class="back-btn" onclick="closeDetail()">← Back</button>
        <span id="detail-title" style="font-size:12px;color:#888;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1"></span>
        <button class="btn" id="edit-toggle-btn" onclick="toggleEdit()" style="font-size:11px;padding:4px 9px">✏️ Edit</button>
      </div>
      <div class="detail-scroll" id="detail-scroll"></div>
    </div>
  </div>
</div>

<div class="modal-wrap" id="modal">
  <div class="modal">
    <h2>Add property</h2>
    <div class="field"><label>Listing URL (Daft or MyHome)</label><input type="url" id="f-url" placeholder="https://www.daft.ie/..."></div>
    <div class="field"><label>Full address</label><input type="text" id="f-addr" placeholder="14 Maple Road, Drumcondra, Dublin 9"></div>
    <div class="field"><label>Eircode</label><input type="text" id="f-eircode" placeholder="D09 X2K3" style="text-transform:uppercase"><div class="hint">Used to place pin accurately</div></div>
    <div class="field"><label>Asking price</label><input type="text" id="f-price" placeholder="€395,000"></div>
    <div class="tc">
      <div class="field"><label>Beds</label><input type="number" id="f-beds" min="1" max="10"></div>
      <div class="field"><label>Baths</label><input type="number" id="f-baths" min="1" max="10"></div>
    </div>
    <div class="tc">
      <div class="field"><label>Floor area (m²)</label><input type="number" id="f-area" min="1" placeholder="85"></div>
      <div class="field"><label>BER</label><input type="text" id="f-ber" placeholder="B2"></div>
    </div>
    <div class="field"><label>Management fees (€/yr)</label><input type="number" id="f-fees" min="0" placeholder="1200"></div>
    <div class="mactions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn primary" onclick="addHouse()">Add property</button>
    </div>
  </div>
</div>

<input type="file" id="photo-input" accept="image/*" multiple style="display:none" onchange="handlePhotos(event)">

<script>
const SUPA_URL='https://ptcfdabyiuzgylmjluic.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB0Y2ZkYWJ5aXV6Z3lsbWpsdWljIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzMDc5NDEsImV4cCI6MjA5Njg4Mzk0MX0.bdn9GIWpfRzzFPRcqTm-k1DAH-N_QpiLvsveRHtAQw4';
const HEADERS={'Content-Type':'application/json','apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY};
const GOOGLE_KEY='AIzaSyDfSRQLf959OZO7t_Wy1Kuf-iwpggOjzqw';
const ARISTA={lat:53.3493,lng:-6.2435};
const SC={interested:'#1D9E75',viewing:'#C8823A',offered:'#378ADD',passed:'#9b9b9b'};
const SL={interested:'Interested',viewing:'Viewing',offered:'Offered',passed:'Passed'};

let houses=[],markers={},activeId=null,editingId=null;

function syncStatus(state,msg){
  document.getElementById('sync-dot').className='sync-dot '+state;
  document.getElementById('sync-label').textContent=msg;
}

// ---- Supabase ----
async function dbLoad(){
  try{
    const r=await fetch(`${SUPA_URL}/rest/v1/houses?select=id,data&order=id.asc`,{headers:HEADERS});
    if(!r.ok) throw new Error(await r.text());
    const rows=await r.json();
    houses=rows.map(row=>({...row.data,id:row.id}));
    try{localStorage.setItem('ht_bk',JSON.stringify(houses));}catch(e){}
    syncStatus('ok','Synced');
  }catch(e){
    console.error('Load failed:',e);
    try{const bk=JSON.parse(localStorage.getItem('ht_bk')||'[]');if(bk.length){houses=bk;syncStatus('err','Offline — cached');return;}}catch(e2){}
    syncStatus('err','Load failed');
  }
}
async function dbUpsert(h){
  syncStatus('saving','Saving…');
  try{localStorage.setItem('ht_bk',JSON.stringify(houses));}catch(e){}
  try{
    const r=await fetch(`${SUPA_URL}/rest/v1/houses`,{method:'POST',headers:{...HEADERS,'Prefer':'resolution=merge-duplicates'},body:JSON.stringify({id:h.id,data:h})});
    if(!r.ok) throw new Error(await r.text());
    syncStatus('ok','Saved');
  }catch(e){syncStatus('err','Save failed');console.error(e);}
}
async function dbDelete(id){
  try{await fetch(`${SUPA_URL}/rest/v1/houses?id=eq.${id}`,{method:'DELETE',headers:HEADERS});}catch(e){}
}

// ---- Map ----
const map=L.map('map').setView([53.3498,-6.2603],13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:19}).addTo(map);

function makeIcon(color){
  return L.divIcon({className:'',html:`<div style="width:30px;height:30px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);background:${color};border:2.5px solid white;box-shadow:0 2px 6px rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center"><span style="transform:rotate(45deg);font-size:13px;line-height:1">🏠</span></div>`,iconSize:[30,30],iconAnchor:[15,30],popupAnchor:[0,-34]});
}
function placeMarker(h){
  if(!h.lat) return;
  if(markers[h.id]) markers[h.id].remove();
  const m=L.marker([h.lat,h.lng],{icon:makeIcon(SC[h.status||'interested'])}).addTo(map)
    .bindPopup(`<b style="font-size:13px">${h.address||'Property'}</b><br><span style="color:#666;font-size:12px">${h.price?'€'+h.price:''}</span>`);
  m.on('click',()=>openDetail(h.id));
  markers[h.id]=m;
}
function fitAll(){
  const pts=houses.filter(h=>h.lat).map(h=>[h.lat,h.lng]);
  if(pts.length>1) map.fitBounds(pts,{padding:[40,40]});
  else if(pts.length===1) map.setView(pts[0],15);
}
async function geocode(h){
  if(h.lat) return;
  const addr=(h.address||'').trim();
  const eircode=h.eircode?h.eircode.slice(0,3)+' '+h.eircode.slice(3):'';
  const q=eircode?`${addr} ${eircode} Ireland`:`${addr} Ireland`;
  try{
    const r=await fetch(`https://maps.googleapis.com/maps/api/geocode/json?address=${encodeURIComponent(q)}&region=ie&key=${GOOGLE_KEY}`);
    const d=await r.json();
    if(d.status==='OK'&&d.results[0]){
      h.lat=d.results[0].geometry.location.lat;
      h.lng=d.results[0].geometry.location.lng;
      await dbUpsert(h);
    }
  }catch(e){console.error('Geocode failed:',e);}
}

// ---- Render list ----
function render(){
  const list=document.getElementById('hlist');
  const empty=document.getElementById('hempty');
  document.getElementById('cnt').textContent=houses.length?`(${houses.length})`:'';
  if(!houses.length){list.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';
  list.innerHTML=houses.map(h=>{
    const s=h.status||'interested';
    const thumb=h.photos&&h.photos[0]?`<img class="thumb" src="${h.photos[0]}" alt="">`:'';
    return `<div class="hcard${activeId===h.id?' active':''}" onclick="openDetail('${h.id}')">
      <div style="display:flex;gap:9px;align-items:flex-start">
        ${thumb}
        <div style="flex:1;min-width:0">
          <div style="display:flex;justify-content:space-between">
            <div class="hprice">${h.price?'€'+h.price:'TBC'}</div>
            <div class="sdot" style="background:${SC[s]};margin-top:3px"></div>
          </div>
          <div class="haddr">${h.address||'No address'}</div>
          <div class="hmeta">
            ${h.beds?'<span>'+h.beds+' bed</span>':''}
            ${h.baths?'<span>'+h.baths+' bath</span>':''}
            ${h.area?'<span>'+h.area+' m²</span>':''}
            ${h.fees?'<span>€'+h.fees+'/yr</span>':''}
            ${h.gut?'<span style="color:#C8823A">'+'★'.repeat(h.gut)+'</span>':''}
          </div>
        </div>
      </div>
      <button class="hcard-del" onclick="event.stopPropagation();quickDelete('${h.id}')">✕</button>
    </div>`;
  }).join('');
}

// ---- Detail drawer ----
function openDetail(id){
  activeId=id;editingId=null;
  const h=houses.find(x=>x.id===id);
  if(!h) return;
  document.getElementById('detail-title').textContent=h.address||'Property';
  document.getElementById('edit-toggle-btn').textContent='✏️ Edit';
  renderDetail();
  document.getElementById('panel-list').classList.add('slide-out');
  document.getElementById('panel-detail').classList.add('slide-in');
  render();
  // Pan map to property
  if(h.lat) map.panTo([h.lat,h.lng],{animate:true});
}
function closeDetail(){
  activeId=null;editingId=null;
  document.getElementById('panel-list').classList.remove('slide-out');
  document.getElementById('panel-detail').classList.remove('slide-in');
  render();
}
function toggleEdit(){
  if(!activeId) return;
  if(editingId===activeId){editingId=null;}else{editingId=activeId;}
  document.getElementById('edit-toggle-btn').textContent=editingId?'✕ Cancel':'✏️ Edit';
  renderDetail();
}

function renderDetail(){
  const h=houses.find(x=>x.id===activeId);
  if(!h) return;
  const s=h.status||'interested';
  const photos=h.photos||[];
  const photoGrid=`<div class="photo-grid">
    ${photos.map((p,i)=>`<div class="photo-item"><img src="${p}" alt=""><button class="photo-del" onclick="deletePhoto('${h.id}',${i})">×</button></div>`).join('')}
    <div class="photo-add" onclick="triggerPhotoUpload('${h.id}')"><span>+</span><div>Photos</div></div>
  </div>`;

  const el=document.getElementById('detail-scroll');

  if(editingId===h.id){
    el.innerHTML=`<div class="dcard">
      ${photoGrid}
      <div class="edit-grid">
        <div class="edit-field" style="grid-column:1/-1"><label>Address</label><input id="e-addr" value="${esc(h.address||'')}"></div>
        <div class="edit-field" style="grid-column:1/-1"><label>Listing URL</label><input type="url" id="e-url" value="${esc(h.url||'')}"></div>
        <div class="edit-field"><label>Price (€)</label><input id="e-price" value="${esc(h.price||'')}"></div>
        <div class="edit-field"><label>Eircode</label><input id="e-eircode" value="${esc(h.eircode||'')}" style="text-transform:uppercase"></div>
        <div class="edit-field"><label>Beds</label><input type="number" id="e-beds" value="${esc(h.beds||'')}"></div>
        <div class="edit-field"><label>Baths</label><input type="number" id="e-baths" value="${esc(h.baths||'')}"></div>
        <div class="edit-field"><label>Floor area (m²)</label><input type="number" id="e-area" value="${esc(h.area||'')}"></div>
        <div class="edit-field"><label>BER</label><input id="e-ber" value="${esc(h.ber||'')}"></div>
        <div class="edit-field"><label>Maint. fees (€/yr)</label><input type="number" id="e-fees" value="${esc(h.fees||'')}"></div>
        <div class="edit-field"><label>Status</label>
          <select id="e-status">${Object.entries(SL).map(([k,v])=>`<option value="${k}"${s===k?' selected':''}>${v}</option>`).join('')}</select>
        </div>
      </div>
      <button class="btn primary" style="width:100%;margin-top:8px" onclick="saveEdit('${h.id}')">Save changes</button>
    </div>`;
  }else{
    el.innerHTML=`<div class="dcard">
      ${photoGrid}
      <div class="dcard-top">
        <div>
          <div class="dprice-view">${h.price?'€'+h.price:'Price TBC'}</div>
          <div class="daddr-view">${h.address||'—'}</div>
        </div>
        <select class="ss" onchange="setStatus('${h.id}',this.value)">${Object.entries(SL).map(([k,v])=>`<option value="${k}"${s===k?' selected':''}>${v}</option>`).join('')}</select>
      </div>
      <div class="view-grid">
        <div class="dstat"><label>Beds</label><span>${h.beds||'—'}</span></div>
        <div class="dstat"><label>Baths</label><span>${h.baths||'—'}</span></div>
        <div class="dstat"><label>Floor area</label><span>${h.area?h.area+' m²':'—'}</span></div>
        <div class="dstat"><label>BER</label><span>${h.ber||'—'}</span></div>
        <div class="dstat"><label>Eircode</label><span>${h.eircode?h.eircode.slice(0,3)+' '+h.eircode.slice(3):'—'}</span></div>
        <div class="dstat"><label>Maint. fees</label><span>${h.fees?'€'+h.fees+'/yr':'—'}</span></div>
        <div class="dstat"><label>Source</label><span>${h.source||'—'}</span></div>
        <div class="dstat"><label>Photos</label><span>${photos.length}</span></div>
      </div>
      <div class="section-label">Gut feeling</div>
      <div class="stars" id="st-${h.id}">${[1,2,3,4,5].map(n=>`<span class="star${(h.gut||0)>=n?' on':''}" onclick="setGut('${h.id}',${n})">★</span>`).join('')}</div>
      <div class="section-label">Notes</div>
      <textarea onchange="setNotes('${h.id}',this.value)" placeholder="Impressions, things to check…">${h.notes||''}</textarea>
      ${h.url?`<a class="dlink" href="${h.url}" target="_blank">↗ View on ${h.source||'listing'}</a>`:''}
      <div class="dfooter">
        <button class="btn" onclick="relocate('${h.id}')">📍 Re-locate</button>
        <button class="btn danger" onclick="removeHouse('${h.id}')">Remove</button>
      </div>
    </div>`;
  }
}

function esc(s){return String(s).replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

async function saveEdit(id){
  const h=houses.find(x=>x.id===id);if(!h) return;
  const newEircode=document.getElementById('e-eircode').value.trim().toUpperCase().replace(/\s/g,'');
  const addrChanged=document.getElementById('e-addr').value.trim()!==h.address;
  const eircodeChanged=newEircode!==h.eircode;
  h.address=document.getElementById('e-addr').value.trim();
  h.url=document.getElementById('e-url').value.trim();
  h.price=document.getElementById('e-price').value.replace(/[€,\s]/g,'');
  h.eircode=newEircode;
  h.area=document.getElementById('e-area').value;
  h.fees=document.getElementById('e-fees').value;
  h.ber=document.getElementById('e-ber').value.trim().toUpperCase();
  h.beds=document.getElementById('e-beds').value;
  h.baths=document.getElementById('e-baths').value;
  h.status=document.getElementById('e-status').value;
  if(addrChanged||eircodeChanged){h.lat=null;h.lng=null;}
  await dbUpsert(h);
  editingId=null;
  document.getElementById('edit-toggle-btn').textContent='✏️ Edit';
  document.getElementById('detail-title').textContent=h.address||'Property';
  renderDetail();render();
  if(!h.lat){await geocode(h);}
  placeMarker(h);render();
}

// ---- Photos ----
let _photoTargetId=null;
function triggerPhotoUpload(id){_photoTargetId=id;document.getElementById('photo-input').click();}
function handlePhotos(e){
  const h=houses.find(x=>x.id===_photoTargetId);if(!h) return;
  if(!h.photos) h.photos=[];
  const files=Array.from(e.target.files);let done=0;
  files.forEach(file=>{
    const reader=new FileReader();
    reader.onload=async ev=>{h.photos.push(ev.target.result);done++;if(done===files.length){await dbUpsert(h);renderDetail();render();}};
    reader.readAsDataURL(file);
  });
  e.target.value='';
}
async function deletePhoto(id,idx){
  const h=houses.find(x=>x.id===id);if(!h||!h.photos) return;
  h.photos.splice(idx,1);await dbUpsert(h);renderDetail();render();
}

// ---- House actions ----
async function quickDelete(id){
  if(!confirm('Remove this property?')) return;
  houses=houses.filter(x=>x.id!==id);
  if(markers[id]){markers[id].remove();delete markers[id];}
  await dbDelete(id);render();
  if(currentOverlay!=='none'){clearOverlays();setOverlay(currentOverlay);}
}
async function removeHouse(id){
  if(!confirm('Remove this property?')) return;
  houses=houses.filter(x=>x.id!==id);
  if(markers[id]){markers[id].remove();delete markers[id];}
  await dbDelete(id);closeDetail();
}
async function setStatus(id,val){
  const h=houses.find(x=>x.id===id);if(!h) return;
  h.status=val;await dbUpsert(h);render();
  if(markers[id]) markers[id].setIcon(makeIcon(SC[val]));
}
async function setGut(id,val){
  const h=houses.find(x=>x.id===id);if(!h) return;
  h.gut=val;await dbUpsert(h);
  document.querySelectorAll('#st-'+id+' .star').forEach((s,i)=>s.classList.toggle('on',i<val));
}
async function setNotes(id,val){const h=houses.find(x=>x.id===id);if(h){h.notes=val;await dbUpsert(h);}}
async function regeocodeAll(){
  if(!confirm('Re-geocode all pins using Google?')) return;
  syncStatus('saving','Re-locating…');
  for(const h of houses){h.lat=null;h.lng=null;await geocode(h);if(h.lat) placeMarker(h);}
  fitAll();render();syncStatus('ok','All pins updated');
}
async function relocate(id){
  const h=houses.find(x=>x.id===id);if(!h) return;
  h.lat=null;h.lng=null;syncStatus('saving','Locating…');
  await geocode(h);
  if(h.lat){placeMarker(h);map.panTo([h.lat,h.lng]);syncStatus('ok','Pin updated');}
  else syncStatus('err','Could not locate');
}

// ---- Modal ----
function openModal(){document.getElementById('modal').classList.add('open');}
function closeModal(){
  document.getElementById('modal').classList.remove('open');
  ['f-url','f-addr','f-price','f-beds','f-baths','f-eircode','f-area','f-ber','f-fees'].forEach(id=>document.getElementById(id).value='');
  setTimeout(()=>map.invalidateSize(),200);
}
async function addHouse(){
  const url=document.getElementById('f-url').value.trim();
  const addr=document.getElementById('f-addr').value.trim();
  const eircode=document.getElementById('f-eircode').value.trim().toUpperCase().replace(/\s/g,'');
  if(!addr&&!url&&!eircode){alert('Please enter at least an address');return;}
  const price=document.getElementById('f-price').value.replace(/[€,\s]/g,'');
  const source=url.includes('daft.ie')?'Daft.ie':url.includes('myhome.ie')?'MyHome.ie':'';
  const h={id:Date.now().toString(),url,address:addr,eircode,price,
    beds:document.getElementById('f-beds').value,
    baths:document.getElementById('f-baths').value,
    area:document.getElementById('f-area').value,
    ber:document.getElementById('f-ber').value.trim().toUpperCase(),
    fees:document.getElementById('f-fees').value,
    source,status:'interested',gut:0,notes:'',photos:[]};
  houses.push(h);
  await dbUpsert(h);closeModal();render();
  syncStatus('saving','Locating pin…');
  await geocode(h);
  if(h.lat) placeMarker(h);
  fitAll();render();syncStatus('ok','Saved');
}

// ========== OVERLAYS ==========
let currentOverlay='none';
let areaCircles=[];
let feesCircles=[];
let transportLines=[];
let greenLayer=null;
let hoverRouteLayer=null;
let activeStopMarker=null;

function setOverlay(type){
  console.log('setOverlay:',type);
  currentOverlay=type;
  ['none','transport','area','fees','green'].forEach(t=>{
    const el=document.getElementById('ovl-'+t);
    if(el) el.classList.toggle('active',t===type);
  });
  clearOverlays();
  if(type==='area') drawAreaOverlay();
  else if(type==='fees') drawFeesOverlay();
  else if(type==='transport') drawTransportOverlay();
  else if(type==='green') drawGreenOverlay();
}

function clearOverlays(){
  areaCircles.forEach(c=>{try{c.remove();}catch(e){}});areaCircles=[];
  feesCircles.forEach(c=>{try{c.remove();}catch(e){}});feesCircles=[];
  transportLines.forEach(l=>{try{l.remove();}catch(e){}});transportLines=[];
  if(hoverRouteLayer){try{hoverRouteLayer.remove();}catch(e){}hoverRouteLayer=null;}
  if(greenLayer){try{map.removeLayer(greenLayer);}catch(e){}greenLayer=null;}
}

// Floor area overlay
function drawAreaOverlay(){
  const located=houses.filter(h=>h.lat);
  if(!located.length) return;
  const areas=located.map(h=>parseFloat(h.area)||80);
  const maxA=Math.max(...areas),minA=Math.min(...areas);
  located.forEach(h=>{
    const sqm=parseFloat(h.area)||80;
    // Bigger circles: min 250m, max 600m radius
    const radius=250+((sqm-minA)/(Math.max(maxA-minA,1)))*350;
    const c=L.circle([h.lat,h.lng],{radius,color:'#378ADD',fillColor:'#378ADD',fillOpacity:0.15,weight:2,opacity:0.7}).addTo(map);
    c.bindTooltip(h.area?`${sqm} m²`:'Area unknown',{permanent:true,direction:'top',offset:[0,-8]});
    c.openTooltip();
    areaCircles.push(c);
  });
  syncStatus('ok','Floor area overlay');
}

// Maintenance fees overlay
function drawFeesOverlay(){
  const located=houses.filter(h=>h.lat);
  if(!located.length) return;
  const fees=located.map(h=>parseFloat(h.fees)||0);
  const maxF=Math.max(...fees)||1;
  located.forEach(h=>{
    const fee=parseFloat(h.fees)||0;
    if(!fee){
      // No fees — small grey circle
      const c=L.circle([h.lat,h.lng],{radius:80,color:'#aaa',fillColor:'#aaa',fillOpacity:0.15,weight:1.5,opacity:0.5}).addTo(map);
      c.bindTooltip('No fees set',{permanent:true,direction:'top',offset:[0,-6]});
      c.openTooltip();
      feesCircles.push(c);
      return;
    }
    // Higher fees = larger, more red circle
    const ratio=fee/maxF;
    const radius=80+ratio*300;
    const r=Math.round(180+ratio*75), g=Math.round(100-ratio*80), b=50;
    const color=`rgb(${r},${g},${b})`;
    const c=L.circle([h.lat,h.lng],{radius,color,fillColor:color,fillOpacity:0.2,weight:2,opacity:0.8}).addTo(map);
    c.bindTooltip(`€${fee.toLocaleString()}/yr`,{permanent:true,direction:'top',offset:[0,-8]});
    c.openTooltip();
    feesCircles.push(c);
  });
  syncStatus('ok','Maintenance fees overlay');
}

// Green spaces overlay
async function drawGreenOverlay(){
  const located=houses.filter(h=>h.lat);
  if(!located.length){syncStatus('ok','No pinned properties');return;}
  syncStatus('saving','Loading green spaces…');
  const lats=located.map(h=>h.lat),lngs=located.map(h=>h.lng);
  const pad=0.05;
  const bbox=`${Math.min(...lats)-pad},${Math.min(...lngs)-pad},${Math.max(...lats)+pad},${Math.max(...lngs)+pad}`;
  const q=`[out:json][timeout:25];(way["leisure"="park"](${bbox});way["leisure"="nature_reserve"](${bbox});way["landuse"="grass"](${bbox});way["landuse"="recreation_ground"](${bbox});way["leisure"="garden"](${bbox}););out geom;`;
  try{
    const elements=await overpassQuery(q);
    const features=(elements||[]).filter(el=>el.geometry&&el.geometry.length>2).map(el=>({
      type:'Feature',properties:{name:(el.tags&&el.tags.name)||''},
      geometry:{type:'Polygon',coordinates:[el.geometry.map(p=>[p.lon,p.lat])]}
    }));
    greenLayer=L.geoJSON({type:'FeatureCollection',features},{
      style:{color:'#2d8a4e',fillColor:'#52b788',fillOpacity:0.3,weight:1.5,opacity:0.7},
      onEachFeature:(f,layer)=>{if(f.properties.name) layer.bindTooltip('🌿 '+f.properties.name,{sticky:true});}
    }).addTo(map);
    syncStatus('ok',features.length+' green spaces loaded');
  }catch(e){
    console.error('Green overlay failed:',e);
    syncStatus('err','Could not load green spaces');
  }
}

// Transport overlay
const STOP_ICONS={bus:'🚌',train:'🚆',luas:'🚊',ferry:'⛴'};
const STOP_COLORS={bus:'#0057B8',train:'#E8A000',luas:'#C8102E',ferry:'#0099CC'};
const TYPE_LABELS={bus:'Bus',train:'DART/Rail',luas:'Luas',ferry:'Ferry'};

function makeStopIcon(type,highlight){
  const bg=STOP_COLORS[type]||'#0057B8';
  const sh=highlight?`0 0 0 3px ${bg},0 2px 8px rgba(0,0,0,.4)`:'0 1px 4px rgba(0,0,0,.3)';
  return L.divIcon({className:'',html:`<div style="width:26px;height:26px;border-radius:50%;background:${bg};border:2.5px solid #fff;display:flex;align-items:center;justify-content:center;font-size:14px;box-shadow:${sh};transition:box-shadow .15s">${STOP_ICONS[type]||'🚌'}</div>`,iconSize:[26,26],iconAnchor:[13,13]});
}
function stopType(tags){
  if(tags.railway==='station') return 'train';
  if(tags.railway==='tram_stop') return 'luas';
  if(tags.amenity==='ferry_terminal') return 'ferry';
  return 'bus';
}

async function overpassQuery(q){
  // Try GET first (simpler, better CORS), fallback to POST
  const encoded=encodeURIComponent(q);
  const mirrors=[
    'https://overpass-api.de/api/interpreter',
    'https://overpass.kumi.systems/api/interpreter'
  ];
  for(const mirror of mirrors){
    try{
      const r=await fetch(`${mirror}?data=${encoded}`,{
        headers:{'Accept':'application/json'}
      });
      if(r.ok){
        const d=await r.json();
        console.log(`Overpass OK from ${mirror}, elements:`,d.elements?.length);
        return d.elements||[];
      }
    }catch(e){
      console.warn(`Overpass GET failed on ${mirror}:`,e.message);
    }
    // Try POST on same mirror
    try{
      const r=await fetch(mirror,{
        method:'POST',
        headers:{'Content-Type':'application/x-www-form-urlencoded'},
        body:'data='+encoded
      });
      if(r.ok){
        const d=await r.json();
        console.log(`Overpass POST OK from ${mirror}, elements:`,d.elements?.length);
        return d.elements||[];
      }
    }catch(e){
      console.warn(`Overpass POST failed on ${mirror}:`,e.message);
    }
  }
  console.error('All Overpass mirrors failed');
  return[];
}

async function fetchStopsNear(lat,lng){
  const d=0.018;
  const bbox=`${lat-d},${lng-d*1.5},${lat+d},${lng+d*1.5}`;
  const q=`[out:json][timeout:20];(node["highway"="bus_stop"](${bbox});node["railway"="station"](${bbox});node["railway"="tram_stop"](${bbox}););out body;`;
  return overpassQuery(q);
}

async function fetchRoute(fromLat,fromLng,toLat,toLng){
  try{
    const r=await fetch(`https://router.project-osrm.org/route/v1/driving/${fromLng},${fromLat};${toLng},${toLat}?overview=full&geometries=geojson`);
    const d=await r.json();
    if(d.routes&&d.routes[0]) return d.routes[0].geometry.coordinates.map(c=>[c[1],c[0]]);
  }catch(e){console.warn('Route fetch failed:',e);}
  return null;
}
async function fetchRoutesForStop(stopId){
  try{
    const q=`[out:json][timeout:10];node(${stopId});rel(bn)["route"~"bus|train|tram|light_rail"];out tags;`;
    const els=await overpassQuery(q);
    return els.map(e=>e.tags&&(e.tags.ref||e.tags.name)||'').filter(Boolean).slice(0,6);
  }catch(e){return[];}
}

function clearHoverRoute(){
  if(hoverRouteLayer){hoverRouteLayer.remove();hoverRouteLayer=null;}
  if(activeStopMarker){
    const type=activeStopMarker._stopType;
    activeStopMarker.setIcon(makeStopIcon(type,false));
    activeStopMarker.unbindTooltip();
    activeStopMarker=null;
  }
}

function attachStopHoverWithRoutes(marker,stop,type,name){
  marker._stopType=type;
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    const el=marker.getElement();
    if(!el) return;
    el.style.cursor='pointer';

    el.addEventListener('mouseenter',async()=>{
      clearHoverRoute();
      activeStopMarker=marker;
      marker.setIcon(makeStopIcon(type,true));

      const km=(map.distance([stop.lat,stop.lon],[ARISTA.lat,ARISTA.lng])/1000).toFixed(1);

      // Immediate tooltip
      marker.unbindTooltip();
      marker.bindTooltip(
        `<div style="font-size:12px;line-height:1.8;min-width:150px;pointer-events:none"><b>${STOP_ICONS[type]} ${TYPE_LABELS[type]}</b><br>${name}<br><span style="color:#999">${km} km to Arista</span><br><i style="color:#bbb;font-size:11px">Loading routes…</i></div>`,
        {permanent:true,direction:'top',opacity:1,offset:[0,-8]}
      ).openTooltip();

      // Fetch route numbers and road route in parallel
      const [routes, coords] = await Promise.all([
        fetchRoutesForStop(stop.id),
        fetchRoute(stop.lat,stop.lon,ARISTA.lat,ARISTA.lng)
      ]);

      if(activeStopMarker!==marker) return;

      if(coords){
        hoverRouteLayer=L.polyline(coords,{color:STOP_COLORS[type]||'#0057B8',weight:5,opacity:0.8}).addTo(map);
      }

      const routeStr=routes.length?routes.join(', '):'No route data';
      marker.unbindTooltip();
      marker.bindTooltip(
        `<div style="font-size:12px;line-height:1.8;min-width:150px;pointer-events:none"><b>${STOP_ICONS[type]} ${routeStr}</b><br>${name}<br><span style="color:#999">${km} km to Arista</span></div>`,
        {permanent:true,direction:'top',opacity:1,offset:[0,-8]}
      ).openTooltip();
    });

    el.addEventListener('mouseleave',()=>{
      clearHoverRoute();
    });
  }));
}

async function drawTransportOverlay(){
  console.log('drawTransportOverlay: houses with lat=',houses.filter(h=>h.lat).length);
  syncStatus('saving','Loading stops…');

  // Arista marker
  const am=L.marker([ARISTA.lat,ARISTA.lng],{
    icon:L.divIcon({className:'',html:`<div style="background:#1a1a1a;color:#fff;padding:5px 10px;border-radius:8px;font-size:12px;font-weight:600;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,.35)">🏢 Arista</div>`,iconAnchor:[36,14]}),
    zIndexOffset:1000
  }).addTo(map);
  transportLines.push(am);

  const locs=[...houses.filter(h=>h.lat).map(h=>({lat:h.lat,lng:h.lng})),{lat:ARISTA.lat,lng:ARISTA.lng}];
  const seen=new Set();
  let shown=0;

  for(const loc of locs){
    try{
      const stops=await fetchStopsNear(loc.lat,loc.lng);
      console.log(`Got ${stops.length} stops near ${loc.lat.toFixed(3)},${loc.lng.toFixed(3)}`);
      stops.forEach(stop=>{
        if(seen.has(stop.id)) return;
        seen.add(stop.id);
        const tags=stop.tags||{};
        const type=stopType(tags);
        const name=tags.name||tags['name:en']||'Stop';
        const m=L.marker([stop.lat,stop.lon],{icon:makeStopIcon(type,false),title:name}).addTo(map);
        attachStopHoverWithRoutes(m,stop,type,name);
        transportLines.push(m);
        shown++;
      });
    }catch(e){console.error('Stop fetch error:',e);}
  }
  syncStatus('ok',`${shown} stops loaded — hover for route to Arista`);
}

// ---- Boot ----
(async()=>{
  await dbLoad();
  for(const h of houses){
    // Clear bad fallback coord (old Dublin city centre default)
    if(h.lat&&Math.abs(h.lat-53.3498)<0.001&&Math.abs(h.lng+6.2603)<0.001){h.lat=null;h.lng=null;}
    await geocode(h);
    if(h.lat) placeMarker(h);
  }
  fitAll();render();
})();

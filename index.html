<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>House Tracker — Dublin</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f4f0; height: 100vh; display: flex; flex-direction: column; }
.header { display: flex; align-items: center; justify-content: space-between; padding: 12px 18px; background: #fff; border-bottom: 1px solid #e5e3dc; flex-shrink: 0; }
.header h1 { font-size: 15px; font-weight: 600; color: #1a1a1a; }
.add-btn { font-size: 13px; padding: 7px 14px; border: 1px solid #ccc; border-radius: 8px; background: #1a1a1a; color: #fff; cursor: pointer; font-weight: 500; }
.add-btn:hover { background: #333; }
.sync-dot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; flex-shrink: 0; }
.sync-dot.ok { background: #1D9E75; }
.sync-dot.err { background: #e74c3c; }
.sync-dot.saving { background: #C8823A; }
.main { display: flex; flex: 1; overflow: hidden; }
#map { flex: 1; z-index: 1; }
.sidebar { width: 280px; background: #fff; border-left: 1px solid #e5e3dc; display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0; }
.sidebar-hdr { padding: 10px 14px; font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: .06em; border-bottom: 1px solid #e5e3dc; flex-shrink: 0; }
.hlist { overflow-y: auto; flex: 1; }
.hcard { padding: 11px 14px; border-bottom: 1px solid #f0ede6; cursor: pointer; transition: background .1s; }
.hcard:hover { background: #faf9f6; }
.hcard.active { background: #eef4ff; border-left: 3px solid #378ADD; padding-left: 11px; }
.hprice { font-size: 13px; font-weight: 600; color: #1a1a1a; }
.haddr { font-size: 11px; color: #888; margin-top: 2px; line-height: 1.4; }
.hmeta { display: flex; gap: 8px; margin-top: 5px; font-size: 11px; color: #999; align-items: center; flex-wrap: wrap; }
.sdot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.empty { padding: 20px 14px; font-size: 13px; color: #aaa; line-height: 1.6; }
.hcard { position: relative; }
.hcard-del { display: none; position: absolute; top: 50%; right: 10px; transform: translateY(-50%); background: #fff5f4; border: 1px solid #f5c6c2; color: #c0392b; border-radius: 6px; padding: 4px 8px; font-size: 11px; cursor: pointer; z-index: 2; }
.hcard:hover .hcard-del { display: block; }
.hcard-del:hover { background: #ffe0de; }
.overlay-bar { display: flex; gap: 6px; align-items: center; padding: 7px 14px; background: #fff; border-bottom: 1px solid #e5e3dc; flex-shrink: 0; }
.overlay-bar span { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: .05em; margin-right: 4px; }
.ovl-btn { font-size: 12px; padding: 5px 12px; border: 1px solid #ddd; border-radius: 20px; background: #fff; color: #555; cursor: pointer; transition: all .15s; }
.ovl-btn:hover { border-color: #999; color: #1a1a1a; }
.ovl-btn.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
.thumb { width: 40px; height: 40px; object-fit: cover; border-radius: 6px; flex-shrink: 0; }
.detail { display: none; position: absolute; inset: 0; background: #f5f4f0; overflow-y: auto; z-index: 10; }
.detail.open { display: block; }
.detail-inner { max-width: 680px; margin: 0 auto; padding: 20px; }
.back { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; color: #666; cursor: pointer; border: none; background: none; padding: 0; margin-bottom: 16px; }
.back:hover { color: #1a1a1a; }
.dcard { background: #fff; border-radius: 12px; border: 1px solid #e5e3dc; padding: 20px; margin-bottom: 16px; }
.photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; margin-bottom: 16px; }
.photo-item { position: relative; aspect-ratio: 4/3; border-radius: 8px; overflow: hidden; background: #f0ede6; }
.photo-item img { width: 100%; height: 100%; object-fit: cover; }
.photo-del { position: absolute; top: 4px; right: 4px; background: rgba(0,0,0,.55); color: #fff; border: none; border-radius: 50%; width: 22px; height: 22px; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.photo-add { border: 2px dashed #ddd; border-radius: 8px; aspect-ratio: 4/3; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; color: #aaa; font-size: 12px; gap: 4px; }
.photo-add:hover { border-color: #999; color: #666; }
.photo-add span { font-size: 22px; }
.edit-field { margin-bottom: 12px; }
.edit-field label { font-size: 11px; color: #999; display: block; margin-bottom: 4px; text-transform: uppercase; letter-spacing: .04em; }
.edit-field input, .edit-field select { width: 100%; border: 1px solid #ddd; border-radius: 8px; padding: 8px 11px; font-size: 13px; font-family: inherit; color: #1a1a1a; background: #fff; }
.edit-field input:focus { outline: none; border-color: #999; }
.edit-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
.view-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
.dstat { background: #f5f4f0; border-radius: 8px; padding: 10px 12px; }
.dstat label { font-size: 10px; color: #999; display: block; margin-bottom: 3px; text-transform: uppercase; letter-spacing: .04em; }
.dstat span { font-size: 14px; font-weight: 600; color: #1a1a1a; }
.section-label { font-size: 11px; color: #999; margin-bottom: 6px; text-transform: uppercase; letter-spacing: .04em; margin-top: 14px; }
.stars { display: flex; gap: 4px; margin-bottom: 4px; }
.star { font-size: 22px; cursor: pointer; color: #ddd; line-height: 1; transition: color .1s; }
.star.on { color: #C8823A; }
textarea { width: 100%; border: 1px solid #e0ddd6; border-radius: 8px; padding: 10px 12px; font-size: 13px; font-family: inherit; background: #fff; color: #1a1a1a; resize: vertical; min-height: 80px; line-height: 1.5; margin-top: 6px; }
textarea:focus { outline: none; border-color: #aaa; }
.dlink { display: inline-flex; align-items: center; gap: 5px; font-size: 13px; color: #378ADD; margin-top: 12px; text-decoration: none; }
.dlink:hover { text-decoration: underline; }
.dfooter { margin-top: 16px; padding-top: 14px; border-top: 1px solid #f0ede6; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.ss { font-size: 13px; padding: 6px 10px; border: 1px solid #ddd; border-radius: 8px; background: #fff; color: #1a1a1a; cursor: pointer; }
.btn { padding: 7px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; cursor: pointer; background: #fff; color: #555; font-family: inherit; }
.btn:hover { background: #f5f4f0; }
.btn.primary { background: #1a1a1a; color: #fff; border-color: #1a1a1a; font-weight: 500; }
.btn.primary:hover { background: #333; }
.btn.danger { color: #c0392b; border-color: #f5c6c2; }
.btn.danger:hover { background: #fff5f4; }
.dprice-view { font-size: 22px; font-weight: 700; color: #1a1a1a; }
.daddr-view { font-size: 13px; color: #888; margin-top: 2px; margin-bottom: 16px; }
.dcard-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
.modal-wrap { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); align-items: center; justify-content: center; z-index: 100; }
.modal-wrap.open { display: flex; }
.modal { background: #fff; border-radius: 14px; padding: 22px; width: 360px; box-shadow: 0 8px 40px rgba(0,0,0,.15); max-height: 90vh; overflow-y: auto; }
.modal h2 { font-size: 15px; font-weight: 600; margin-bottom: 16px; }
.field { margin-bottom: 12px; }
.field label { font-size: 11px; color: #888; display: block; margin-bottom: 4px; text-transform: uppercase; letter-spacing: .04em; }
.field input { width: 100%; border: 1px solid #ddd; border-radius: 8px; padding: 8px 11px; font-size: 13px; font-family: inherit; color: #1a1a1a; }
.field input:focus { outline: none; border-color: #999; }
.tc { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.mactions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
.hint { font-size: 11px; color: #aaa; margin-top: 4px; }
.area-tip { background: rgba(55,138,221,0.9) !important; color: #fff !important; border: none !important; font-size: 11px !important; font-weight: 600 !important; padding: 3px 7px !important; border-radius: 4px !important; }
.area-tip::before { display: none !important; }
</style>
</head>
<body>

<div class="header">
  <h1>🏠 House Tracker <span id="cnt" style="color:#888;font-weight:400;font-size:13px"></span></h1>
  <div style="display:flex;gap:10px;align-items:center">
    <div class="sync-dot" id="sync-dot" title="Sync status"></div>
    <span id="sync-label" style="font-size:11px;color:#aaa">Connecting…</span>
    <button class="add-btn" onclick="openModal()">+ Add property</button>
    <button class="add-btn" style="background:#555;margin-left:4px" onclick="regeocodeAll()" title="Fix all pin locations using Google">📍 Fix all pins</button>
  </div>
</div>

<div class="overlay-bar">
  <span>Overlay</span>
  <button class="ovl-btn active" id="ovl-none" onclick="setOverlay('none')">None</button>
  <button class="ovl-btn" id="ovl-transport" onclick="setOverlay('transport')">🚌 Transport</button>
  <button class="ovl-btn" id="ovl-area" onclick="setOverlay('area')">⬤ Floor area</button>
</div>
<div class="main" id="main-view">
  <div id="map"></div>
  <div class="sidebar">
    <div class="sidebar-hdr">Properties</div>
    <div class="hlist" id="hlist"></div>
    <div class="empty" id="hempty">No properties yet.<br>Add a daft.ie or myhome.ie listing to get started.</div>
  </div>
</div>

<div class="detail" id="detail-view">
  <div class="detail-inner">
    <button class="back" onclick="closeDetail()">← All properties</button>
    <div id="dcontent"></div>
  </div>
</div>

<div class="modal-wrap" id="modal">
  <div class="modal">
    <h2>Add property</h2>
    <div class="field"><label>Listing URL (Daft or MyHome)</label><input type="url" id="f-url" placeholder="https://www.daft.ie/..."></div>
    <div class="field"><label>Full address</label><input type="text" id="f-addr" placeholder="14 Maple Road, Drumcondra, Dublin 9"></div>
    <div class="field"><label>Eircode</label><input type="text" id="f-eircode" placeholder="D09 X2K3" style="text-transform:uppercase"><div class="hint">Pins the property precisely on the map</div></div>
    <div class="field"><label>Asking price</label><input type="text" id="f-price" placeholder="€395,000"></div>
    <div class="tc">
      <div class="field"><label>Beds</label><input type="number" id="f-beds" min="1" max="10" placeholder="3"></div>
      <div class="field"><label>Baths</label><input type="number" id="f-baths" min="1" max="10" placeholder="2"></div>
    </div>
    <div class="tc">
      <div class="field"><label>Floor area (m²)</label><input type="number" id="f-area" min="1" placeholder="85"></div>
      <div class="field"><label>BER</label><input type="text" id="f-ber" placeholder="B2"></div>
    </div>
    <div class="mactions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn primary" onclick="addHouse()">Add property</button>
    </div>
  </div>
</div>

<input type="file" id="photo-input" accept="image/*" multiple style="display:none" onchange="handlePhotos(event)">

<script>
const SUPA_URL = 'https://ptcfdabyiuzgylmjluic.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB0Y2ZkYWJ5aXV6Z3lsbWpsdWljIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzMDc5NDEsImV4cCI6MjA5Njg4Mzk0MX0.bdn9GIWpfRzzFPRcqTm-k1DAH-N_QpiLvsveRHtAQw4';
const HEADERS = { 'Content-Type': 'application/json', 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY };

const SC = { interested:'#1D9E75', viewing:'#C8823A', offered:'#378ADD', passed:'#9b9b9b' };
const SL = { interested:'Interested', viewing:'Viewing', offered:'Offered', passed:'Passed' };

let houses = [], markers = {}, activeId = null, editingId = null;

function syncStatus(state, msg) {
  const dot = document.getElementById('sync-dot');
  const lbl = document.getElementById('sync-label');
  dot.className = 'sync-dot ' + state;
  lbl.textContent = msg;
}

// ---- Supabase CRUD ----
async function dbLoad() {
  try {
    const r = await fetch(`${SUPA_URL}/rest/v1/houses?select=id,data&order=id.asc`, { headers: HEADERS });
    if (!r.ok) {
      const err = await r.text();
      console.error('dbLoad error:', r.status, err);
      throw new Error(err);
    }
    const rows = await r.json();
    console.log('Loaded', rows.length, 'properties from Supabase');
    houses = rows.map(row => ({ ...row.data, id: row.id }));
    // Keep localStorage in sync as backup
    try { localStorage.setItem('ht_backup', JSON.stringify(houses)); } catch(e) {}
    syncStatus('ok', 'Synced');
  } catch(e) {
    console.error('Supabase load failed:', e);
    // Fall back to localStorage backup
    try {
      const backup = JSON.parse(localStorage.getItem('ht_backup') || '[]');
      if (backup.length) {
        houses = backup;
        syncStatus('err', 'Offline — showing cached data');
        console.warn('Using localStorage backup:', backup.length, 'properties');
        return;
      }
    } catch(e2) {}
    syncStatus('err', 'Could not load — check Supabase RLS policies');
  }
}

async function dbUpsert(h) {
  syncStatus('saving', 'Saving…');
  // Always write to localStorage backup first
  try { localStorage.setItem('ht_backup', JSON.stringify(houses)); } catch(e) {}
  try {
    const r = await fetch(`${SUPA_URL}/rest/v1/houses`, {
      method: 'POST',
      headers: { ...HEADERS, 'Prefer': 'resolution=merge-duplicates' },
      body: JSON.stringify({ id: h.id, data: h })
    });
    if (!r.ok) throw new Error(await r.text());
    syncStatus('ok', 'Saved');
  } catch(e) {
    syncStatus('err', 'Saved locally — sync failed');
    console.error('dbUpsert failed:', e);
  }
}

async function dbDelete(id) {
  syncStatus('saving', 'Deleting…');
  try {
    const r = await fetch(`${SUPA_URL}/rest/v1/houses?id=eq.${id}`, { method: 'DELETE', headers: HEADERS });
    if (!r.ok) throw new Error(await r.text());
    syncStatus('ok', 'Saved');
  } catch(e) {
    syncStatus('err', 'Delete failed');
  }
}

// ---- Map ----
const map = L.map('map').setView([53.3498, -6.2603], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>', maxZoom: 19
}).addTo(map);

function makeIcon(color) {
  return L.divIcon({
    className: '',
    html: `<div style="width:32px;height:32px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);background:${color};border:2.5px solid white;box-shadow:0 2px 6px rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center"><span style="transform:rotate(45deg);font-size:14px;line-height:1">🏠</span></div>`,
    iconSize:[32,32], iconAnchor:[16,32], popupAnchor:[0,-36]
  });
}

function placeMarker(h) {
  if (!h.lat) return;
  if (markers[h.id]) markers[h.id].remove();
  const m = L.marker([h.lat, h.lng], { icon: makeIcon(SC[h.status||'interested']) })
    .addTo(map)
    .bindPopup(`<b style="font-size:13px">${h.address||'Property'}</b><br><span style="color:#666;font-size:12px">${h.price?'€'+h.price:''}</span>`);
  m.on('click', () => openDetail(h.id));
  markers[h.id] = m;
}

const GOOGLE_KEY = 'AIzaSyDfSRQLf959OZO7t_Wy1Kuf-iwpggOjzqw';

async function geocode(h) {
  if (h.lat) return;
  const addr = (h.address || '').trim();
  const eircode = h.eircode ? h.eircode.slice(0,3) + ' ' + h.eircode.slice(3) : '';
  const q = eircode ? `${addr} ${eircode} Ireland` : `${addr} Ireland`;
  try {
    const r = await fetch(`https://maps.googleapis.com/maps/api/geocode/json?address=${encodeURIComponent(q)}&region=ie&key=${GOOGLE_KEY}`);
    const d = await r.json();
    console.log('Geocode status:', d.status, d.results && d.results[0] && d.results[0].formatted_address);
    if (d.status === 'OK' && d.results[0]) {
      h.lat = d.results[0].geometry.location.lat;
      h.lng = d.results[0].geometry.location.lng;
      await dbUpsert(h);
    } else {
      console.warn('Geocoding failed:', d.status, q);
    }
  } catch(e) { console.error('Geocode error', e); }
}

function fitAll() {
  const pts = houses.filter(h => h.lat).map(h => [h.lat, h.lng]);
  if (pts.length > 1) map.fitBounds(pts, { padding:[40,40] });
  else if (pts.length === 1) map.setView(pts[0], 15);
}

// ---- Render list ----
function render() {
  const list = document.getElementById('hlist');
  const empty = document.getElementById('hempty');
  document.getElementById('cnt').textContent = houses.length ? `(${houses.length})` : '';
  if (!houses.length) { list.innerHTML=''; empty.style.display='block'; return; }
  empty.style.display = 'none';
  list.innerHTML = houses.map(h => {
    const s = h.status || 'interested';
    const thumb = h.photos && h.photos[0] ? `<img class="thumb" src="${h.photos[0]}" alt="">` : '';
    return `<div class="hcard${activeId===h.id?' active':''}" onclick="openDetail('${h.id}')">
      <div style="display:flex;gap:10px;align-items:flex-start">
        ${thumb}
        <div style="flex:1;min-width:0">
          <div style="display:flex;justify-content:space-between">
            <div class="hprice">${h.price?'€'+h.price:'TBC'}</div>
            <div class="sdot" style="background:${SC[s]};margin-top:4px"></div>
          </div>
          <div class="haddr">${h.address||'No address'}</div>
          <div class="hmeta">
            ${h.beds?'<span>'+h.beds+' bed</span>':''}
            ${h.baths?'<span>'+h.baths+' bath</span>':''}
            ${h.ber?'<span>BER '+h.ber+'</span>':''}
            ${h.gut?'<span style="color:#C8823A">'+'★'.repeat(h.gut)+'</span>':''}
          </div>
        </div>
      </div>
      <button class="hcard-del" onclick="event.stopPropagation();quickDelete('${h.id}')">✕ Remove</button>
    </div>`;
  }).join('');
}

// ---- Detail ----
function openDetail(id) {
  activeId = id; editingId = null;
  renderDetail();
  document.getElementById('main-view').style.display = 'none';
  document.getElementById('detail-view').classList.add('open');
  render();
}

function renderDetail() {
  const h = houses.find(x => x.id === activeId);
  if (!h) return;
  const s = h.status || 'interested';
  const photos = h.photos || [];
  const photoGridHTML = `<div class="photo-grid">
    ${photos.map((p,i) => `<div class="photo-item"><img src="${p}" alt=""><button class="photo-del" onclick="deletePhoto('${h.id}',${i})">×</button></div>`).join('')}
    <div class="photo-add" onclick="triggerPhotoUpload('${h.id}')"><span>+</span><div>Add photos</div></div>
  </div>`;

  if (editingId === h.id) {
    document.getElementById('dcontent').innerHTML = `<div class="dcard">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <div style="font-size:14px;font-weight:600">Edit property</div>
        <button class="btn" onclick="cancelEdit()">Cancel</button>
      </div>
      ${photoGridHTML}
      <div class="edit-grid">
        <div class="edit-field" style="grid-column:1/-1"><label>Address</label><input id="e-addr" value="${esc(h.address||'')}"></div>
        <div class="edit-field" style="grid-column:1/-1"><label>Listing URL</label><input type="url" id="e-url" value="${esc(h.url||'')}"></div>
        <div class="edit-field"><label>Price</label><input id="e-price" value="${esc(h.price||'')}"></div>
        <div class="edit-field"><label>Eircode</label><input id="e-eircode" value="${esc(h.eircode||'')}" style="text-transform:uppercase"></div>
        <div class="edit-field"><label>Floor area (m²)</label><input type="number" id="e-area" value="${esc(h.area||'')}" min="1"></div>
        <div class="edit-field"><label>BER</label><input id="e-ber" value="${esc(h.ber||'')}"></div>
        <div class="edit-field"><label>Beds</label><input type="number" id="e-beds" value="${esc(h.beds||'')}" min="1" max="20"></div>
        <div class="edit-field"><label>Baths</label><input type="number" id="e-baths" value="${esc(h.baths||'')}" min="1" max="20"></div>
        <div class="edit-field"><label>Status</label>
          <select id="e-status">${Object.entries(SL).map(([k,v])=>`<option value="${k}"${s===k?' selected':''}>${v}</option>`).join('')}</select>
        </div>
      </div>
      <button class="btn primary" onclick="saveEdit('${h.id}')">Save changes</button>
    </div>`;
  } else {
    document.getElementById('dcontent').innerHTML = `<div class="dcard">
      ${photoGridHTML}
      <div class="dcard-top">
        <div>
          <div class="dprice-view">${h.price?'€'+h.price:'Price TBC'}</div>
          <div class="daddr-view">${h.address||'—'}</div>
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          <select class="ss" onchange="setStatus('${h.id}',this.value)">${Object.entries(SL).map(([k,v])=>`<option value="${k}"${s===k?' selected':''}>${v}</option>`).join('')}</select>
          <button class="btn" onclick="startEdit('${h.id}')">✏️ Edit</button>
        </div>
      </div>
      <div class="view-grid">
        <div class="dstat"><label>Beds</label><span>${h.beds||'—'}</span></div>
        <div class="dstat"><label>Baths</label><span>${h.baths||'—'}</span></div>
        <div class="dstat"><label>BER</label><span>${h.ber||'—'}</span></div>
        <div class="dstat"><label>Eircode</label><span>${h.eircode?h.eircode.slice(0,3)+' '+h.eircode.slice(3):'—'}</span></div>
        <div class="dstat"><label>Source</label><span>${h.source||'—'}</span></div>
        <div class="dstat"><label>Photos</label><span>${photos.length}</span></div>
      </div>
      <div class="section-label">Gut feeling</div>
      <div class="stars" id="st-${h.id}">${[1,2,3,4,5].map(n=>`<span class="star${(h.gut||0)>=n?' on':''}" onclick="setGut('${h.id}',${n})">★</span>`).join('')}</div>
      <div class="section-label">Notes</div>
      <textarea onchange="setNotes('${h.id}',this.value)" placeholder="First impressions, things to check, pros and cons…">${h.notes||''}</textarea>
      ${h.url?`<a class="dlink" href="${h.url}" target="_blank">↗ View on ${h.source||'listing site'}</a>`:''}
      <div class="dfooter">
        <button class="btn" onclick="relocate('${h.id}')">📍 Re-locate pin</button>
        <button class="btn danger" onclick="removeHouse('${h.id}')">Remove</button>
      </div>
    </div>`;
  }
}

function esc(s) { return String(s).replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function startEdit(id) { editingId = id; renderDetail(); }
function cancelEdit() { editingId = null; renderDetail(); }

async function saveEdit(id) {
  const h = houses.find(x => x.id === id);
  if (!h) return;
  const newEircode = document.getElementById('e-eircode').value.trim().toUpperCase().replace(/\s/g,'');
  const addrChanged = document.getElementById('e-addr').value.trim() !== h.address;
  const eircodeChanged = newEircode !== h.eircode;
  h.address = document.getElementById('e-addr').value.trim();
  h.url = document.getElementById('e-url').value.trim();
  h.price = document.getElementById('e-price').value.replace(/[€,\s]/g,'');
  h.eircode = newEircode;
  h.area = document.getElementById('e-area').value;
  h.ber = document.getElementById('e-ber').value.trim().toUpperCase();
  h.beds = document.getElementById('e-beds').value;
  h.baths = document.getElementById('e-baths').value;
  h.status = document.getElementById('e-status').value;
  if (addrChanged || eircodeChanged) { h.lat = null; h.lng = null; }
  await dbUpsert(h);
  editingId = null; renderDetail(); render();
  if (!h.lat) { await geocode(h); } placeMarker(h); render();
}

// ---- Photos ----
let _photoTargetId = null;
function triggerPhotoUpload(id) { _photoTargetId = id; document.getElementById('photo-input').click(); }

function handlePhotos(e) {
  const h = houses.find(x => x.id === _photoTargetId);
  if (!h) return;
  if (!h.photos) h.photos = [];
  const files = Array.from(e.target.files);
  let done = 0;
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = async ev => {
      h.photos.push(ev.target.result);
      done++;
      if (done === files.length) { await dbUpsert(h); renderDetail(); render(); }
    };
    reader.readAsDataURL(file);
  });
  e.target.value = '';
}

async function deletePhoto(id, idx) {
  const h = houses.find(x => x.id === id);
  if (!h || !h.photos) return;
  h.photos.splice(idx, 1);
  await dbUpsert(h); renderDetail(); render();
}

async function regeocodeAll() {
  if (!confirm('Re-locate all pins using Google? This will fix any incorrect locations.')) return;
  syncStatus('saving', 'Relocating all pins…');
  for (const h of houses) {
    h.lat = null; h.lng = null;
    await geocode(h);
    if (h.lat) placeMarker(h);
  }
  fitAll(); render();
  syncStatus('ok', 'All pins updated');
}

async function relocate(id) {
  const h = houses.find(x => x.id === id);
  if (!h) return;
  h.lat = null; h.lng = null;
  syncStatus('saving', 'Locating…');
  await geocode(h);
  if (h.lat) { placeMarker(h); map.setView([h.lat, h.lng], 16); syncStatus('ok', 'Pin updated'); }
  else { syncStatus('err', 'Could not locate — try a more specific address'); }
}

// ---- Overlays ----
let currentOverlay = 'none';
let areaCircles = [];
let transportLines = [];
const ARISTA = { lat: 53.3488, lng: -6.2428 }; // Arista Networks, 2 George's Dock, IFSC, Dublin 1

function setOverlay(type) {
  currentOverlay = type;
  ['none','transport','area'].forEach(t => {
    document.getElementById('ovl-'+t).classList.toggle('active', t === type);
  });
  clearOverlays();
  if (type === 'area') drawAreaOverlay();
  if (type === 'transport') drawTransportOverlay();
}

function clearOverlays() {
  areaCircles.forEach(c => c.remove()); areaCircles = [];
  transportLines.forEach(l => l.remove()); transportLines = [];
}

function drawAreaOverlay() {
  const withArea = houses.filter(h => h.lat && h.area && parseFloat(h.area) > 0);
  const noArea = houses.filter(h => h.lat && (!h.area || parseFloat(h.area) <= 0));

  if (withArea.length === 0 && noArea.length === 0) return;

  // Find min/max for relative scaling
  const areas = withArea.map(h => parseFloat(h.area));
  const maxArea = areas.length ? Math.max(...areas) : 100;
  const minArea = areas.length ? Math.min(...areas) : 50;

  houses.forEach(h => {
    if (!h.lat) return;
    const sqm = parseFloat(h.area) || null;
    // Scale radius: min 60m, max 200m, relative to collection
    let radius;
    if (sqm) {
      radius = 60 + ((sqm - minArea) / (Math.max(maxArea - minArea, 1))) * 140;
    } else {
      radius = 60; // default if no area set
    }
    const c = L.circle([h.lat, h.lng], {
      radius,
      color: '#378ADD',
      fillColor: '#378ADD',
      fillOpacity: 0.18,
      weight: 2,
      opacity: 0.7
    }).addTo(map);
    c.bindTooltip(sqm ? `${sqm} m²` : 'No floor area set', { permanent: true, direction: 'top', className: 'area-tip' });
    areaCircles.push(c);
  });
}

async function drawTransportOverlay() {
  // Draw straight lines from Arista to each property as commute lines
  // Then fetch nearby bus stops from Overpass API
  syncStatus('saving', 'Loading transport…');
  houses.forEach(h => {
    if (!h.lat) return;
    // Commute line from Arista to property
    const line = L.polyline([[ARISTA.lat, ARISTA.lng],[h.lat, h.lng]], {
      color: '#C8823A', weight: 2, opacity: 0.5, dashArray: '6,6'
    }).addTo(map);
    const km = (map.distance([ARISTA.lat, ARISTA.lng],[h.lat, h.lng])/1000).toFixed(1);
    line.bindTooltip(`${km} km from Arista`, { sticky: true });
    transportLines.push(line);
  });

  // Mark Arista office
  const aristaMarker = L.marker([ARISTA.lat, ARISTA.lng], {
    icon: L.divIcon({
      className: '',
      html: `<div style="background:#1a1a1a;color:#fff;padding:4px 8px;border-radius:6px;font-size:11px;font-weight:600;white-space:nowrap;box-shadow:0 2px 6px rgba(0,0,0,.3)">🏢 Arista</div>`,
      iconAnchor: [30, 12]
    })
  }).addTo(map);
  transportLines.push(aristaMarker);

  // Fetch bus stops near each property from Overpass
  for (const h of houses) {
    if (!h.lat) continue;
    try {
      const bbox = `${h.lat-0.005},${h.lng-0.008},${h.lat+0.005},${h.lng+0.008}`;
      const query = `[out:json][timeout:10];node["highway"="bus_stop"](${bbox});out body;`;
      const r = await fetch('https://overpass-api.de/api/interpreter', {
        method: 'POST', body: 'data=' + encodeURIComponent(query)
      });
      const d = await r.json();
      (d.elements || []).slice(0, 8).forEach(stop => {
        const m = L.circleMarker([stop.lat, stop.lon], {
          radius: 5, color: '#C8823A', fillColor: '#fff', fillOpacity: 1, weight: 2
        }).addTo(map);
        if (stop.tags && stop.tags.name) m.bindTooltip(stop.tags.name, { direction: 'top' });
        transportLines.push(m);
      });
    } catch(e) { console.warn('Bus stop fetch failed', e); }
  }
  syncStatus('ok', 'Transport loaded');
}

async function quickDelete(id) {
  if (!confirm('Remove this property?')) return;
  houses = houses.filter(x => x.id !== id);
  if (markers[id]) { markers[id].remove(); delete markers[id]; }
  await dbDelete(id);
  if (currentOverlay !== 'none') { clearOverlays(); setOverlay(currentOverlay); }
  render();
}

function closeDetail() {
  activeId = null; editingId = null;
  document.getElementById('main-view').style.display = 'flex';
  document.getElementById('detail-view').classList.remove('open');
  setTimeout(() => map.invalidateSize(), 50);
  render();
}

async function setStatus(id, val) {
  const h = houses.find(x => x.id === id);
  if (!h) return;
  h.status = val;
  await dbUpsert(h); render();
  if (markers[id]) markers[id].setIcon(makeIcon(SC[val]));
}
async function setGut(id, val) {
  const h = houses.find(x => x.id === id);
  if (!h) return;
  h.gut = val;
  await dbUpsert(h);
  document.querySelectorAll('#st-'+id+' .star').forEach((s,i) => s.classList.toggle('on', i < val));
}
async function setNotes(id, val) {
  const h = houses.find(x => x.id === id);
  if (!h) return;
  h.notes = val;
  await dbUpsert(h);
}
async function removeHouse(id) {
  if (!confirm('Remove this property?')) return;
  houses = houses.filter(x => x.id !== id);
  if (markers[id]) { markers[id].remove(); delete markers[id]; }
  await dbDelete(id); closeDetail();
}

function openModal() { document.getElementById('modal').classList.add('open'); }
function closeModal() {
  document.getElementById('modal').classList.remove('open');
  ['f-url','f-addr','f-price','f-beds','f-baths','f-eircode','f-area','f-ber'].forEach(id => document.getElementById(id).value = '');
  setTimeout(() => map.invalidateSize(), 200);
}

async function addHouse() {
  const url = document.getElementById('f-url').value.trim();
  const addr = document.getElementById('f-addr').value.trim();
  const eircode = document.getElementById('f-eircode').value.trim().toUpperCase().replace(/\s/g,'');
  if (!addr && !url && !eircode) { alert('Please enter at least an address or eircode'); return; }
  const price = document.getElementById('f-price').value.replace(/[€,\s]/g,'');
  const source = url.includes('daft.ie') ? 'Daft.ie' : url.includes('myhome.ie') ? 'MyHome.ie' : '';
  const h = {
    id: Date.now().toString(), url, address: addr, eircode, price,
    beds: document.getElementById('f-beds').value,
    baths: document.getElementById('f-baths').value,
    ber: document.getElementById('f-ber').value.trim().toUpperCase(),
    area: document.getElementById('f-area').value, source, status: 'interested', gut: 0, notes: '', photos: []
  };
  houses.push(h);
  await dbUpsert(h); closeModal();
  // Make sure map is visible and sized correctly before placing pin
  setTimeout(() => map.invalidateSize(), 100);
  render();
  syncStatus('saving', 'Locating pin…');
  await geocode(h);
  if (h.lat) placeMarker(h);
  else syncStatus('err', 'Could not locate — check address');
  fitAll();
  render();
  syncStatus('ok', 'Saved');
}

// ---- Boot ----
const BAD_LAT = 53.3498, BAD_LNG = -6.2603;
function isBadCoord(h) {
  if (!h.lat) return false;
  return (Math.abs(h.lat - BAD_LAT) < 0.001 && Math.abs(h.lng - BAD_LNG) < 0.001);
}

(async () => {
  await dbLoad();
  for (const h of houses) {
    if (isBadCoord(h)) { h.lat = null; h.lng = null; }
    await geocode(h);
    if (h.lat) placeMarker(h);
  }
  fitAll();
  render();
})();
</script>
